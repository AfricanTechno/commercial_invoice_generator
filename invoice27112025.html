<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Commercial Invoice — Pro</title>
  <style>
    /* ==== Plain courier-style commercial invoice ==== */
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      color: #000;
      background: #ffffff;
    }

    .app { min-height: 100%; }

    /* Header bar (screen only) */
    .bar {
      border-bottom: none;
      padding: 6px 8px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 980px;
      margin: 0 auto;
    }
    .title {
      font-weight: bold;
      font-size: 14px;
    }
    .actions, .picker {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .btn {
      padding: 4px 8px;
      border-radius: 0;
      border: none;
      background: #ffffff;
      color: #000;
      font-size: 11px;
      cursor: pointer;
    }
    .btn:hover { background: #f0f0f0; }
    #productSelect {
      padding: 4px 6px;
      border: none;
      font-size: 11px;
    }

    /* Main invoice sheet */
    .stage { padding: 8px; }
    .invoice-wrap { max-width: 980px; margin: 0 auto; }
    .invoice-sheet { border: none; padding: 12px; }
    .invoice-sheet .inner { max-width: 900px; margin: 0 auto; }

    h1 {
      font-size: 16px;
      margin: 0 0 8px 0;
      text-align: left;
      text-transform: uppercase;
    }

    /* Meta section */
    .meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px 8px;
      margin-bottom: 8px;
    }
    .field { display: flex; flex-direction: column; font-size: 11px; }
    .label { margin-bottom: 2px; }
    .input {
      border: none;
      padding: 2px 4px;
      height: 20px;
      font-size: 11px;
    }

    /* Addresses */
    .addresses {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px 12px;
      margin: 8px 0;
    }
    .addr {
      border: none;
      padding: 6px;
      font-size: 11px;
    }
    .addr h3 {
      margin: 0 0 4px 0;
      font-size: 11px;
      text-transform: uppercase;
    }
    .addr textarea {
      width: 100%;
      height: 70px;
      border: none;
      font-size: 11px;
      padding: 2px 4px;
      resize: vertical;
    }

    /* Items: plain grid, scrolls horizontally only if needed */
    .itemsWrap {
      border: none;
      margin-top: 8px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .items { min-width: 780px; }
    .gridCols {
      display: grid;
      grid-template-columns: 32px 45px minmax(260px, 1fr) 110px 80px 90px 50px;
      gap: 0;
    }
    .head {
      border-bottom: none;
      font-weight: bold;
      background: #f2f2f2;
      padding: 4px 4px;
      font-size: 11px;
    }
    .row {
      border-bottom: none;
      padding: 2px 4px;
      font-size: 11px;
    }
    .cell { min-width: 0; }
    .rowIndex { display: inline-block; width: 100%; text-align: center; }
    .cell input {
      width: 100%;
      border: none;
      padding: 1px 3px;
      font-size: 11px;
      height: 18px;
    }
    .cell input.qty { text-align: center; }
    .cell input.unit { text-align: right; }
    .cell input.hs { text-align: left; }
    .lineTotal {
      display: block;
      border: none;
      padding: 1px 3px;
      font-size: 11px;
      height: 18px;
      text-align: right;
    }
    .del {
      width: 100%;
      border: none;
      background: #ffffff;
      font-size: 11px;
      padding: 0;
      height: 18px;
      cursor: pointer;
    }

    .controls {
      margin-top: 6px;
      display: flex;
      gap: 4px;
    }

    /* Totals */
    .totals {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .totalCard {
      border: none;
      padding: 6px 8px;
      min-width: 260px;
      font-size: 11px;
    }
    .totalRow {
      display: flex;
      justify-content: space-between;
      margin: 2px 0;
    }

    /* Print: hide all chrome, show plain table */
    @media print {
      @page { size: A4 portrait; margin: 15mm; }
      body { padding: 0; background: #ffffff; }
      .bar, .controls, .actions, .picker { display: none !important; }
      .invoice-wrap { max-width: none; }
      .invoice-sheet { border: none; padding: 0; }
      .itemsWrap { display: none; }
      .print-only { display: table; width: 100%; border-collapse: collapse; }
      .print-only th, .print-only td {
        border: none !important;
        padding: 3px 4px;
        font-size: 11px;
        text-align: left;
      }
      thead { display: table-header-group; }
    }
    .print-only { display: none; }
  </style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div class="toolbar">
      <div class="title">Invoice</div>
      <div class="actions">
        <button class="btn" onclick="window.print()">Print</button>
        <button class="btn" onclick="generateInvoiceNumber()">New Invoice No.</button>
        <button class="btn" onclick="exportCSV()">Export CSV</button>
        <button class="btn" onclick="exportJSON()">Export JSON</button>
      </div>
      <div class="picker">
        <select id="productSelect">
          <option value="">+ Add product…</option>
          <!-- Full catalogue -->
          <option>Ray-Ban Meta Sunglasses</option>
          <option>Oakley Meta Sunglasses</option>
          <option>Even Reality E1 Smart Glasses</option>
          <option>Meta Quest 3 512GB VR Gaming Console</option>
          <option>Meta Quest 3S 128GB VR Gaming Console</option>
          <option>Meta Quest 3S 256GB VR Gaming Console</option>
          <option>Meta Quest 2 Controllers</option>
          <option>Meta Quest 3 Carrying Case</option>
          <option>Meta Quest 3/3S Compact Carrying Case</option>
          <option>Meta Quest 3 Elite Strap</option>
          <option>Meta Quest 3 Elite Strap with Battery</option>
          <option>Meta Quest 3 Silicone Facial Interface</option>
          <option>Meta Quest Link Cable</option>
          <option>HTC VIVE Pro 2 Full Kit</option>
          <option>Insta360 Quick Release Mount</option>
          <option>Insta360 Mic Air (1 TX + 1 RX)</option>
          <option>Insta360 Xplorer Grip Kit for Insta360 Ace Pro 2/Insta360 Ace Pro</option>
          <option>Insta360 Bullet Time Cord</option>
          <option>Insta360 X5 Replacement Lens Kit</option>
          <option>RANGE 2 3D Scanner</option>
        </select>
        <button class="btn" onclick="addProduct()">Add</button>
      </div>
    </div>
  </div>

  <main class="stage">
    <div class="invoice-wrap">
      <section class="invoice-sheet">
        <div class="inner">
          <h1>Commercial Invoice</h1>

          <!-- Meta -->
          <div class="meta">
            <label class="field"><span class="label">Invoice No.</span><input id="invoiceNumber" class="input"/></label>
            <label class="field"><span class="label">Date (DD-MM-YYYY)</span><input id="invoiceDate" class="input" data-autodate="true"/></label>
            <label class="field"><span class="label">Air Waybill #</span><input id="waybill" class="input"/></label>
            <label class="field"><span class="label">Currency</span><input id="currency" class="input" value="USD"/></label>
          </div>

          <!-- Addresses -->
          <div class="addresses">
            <div class="addr"><h3>Shipper / Exporter</h3><textarea id="shipper"></textarea></div>
            <div class="addr"><h3>Sold To</h3><textarea id="soldto"></textarea></div>
          </div>

          <!-- Items (screen) -->
          <div class="itemsWrap"><div class="items" id="items">
            <div class="head gridCols"><div>#</div><div>Qty</div><div>Description</div><div>HS Code</div><div>Unit</div><div>Line Total</div><div></div></div>
            <!-- Initial rows example -->
            <div class="row gridCols" data-row data-sku="">
              <div class="cell"><span class="rowIndex">1</span></div>
              <div class="cell"><input class="qty" value="2" inputmode="numeric"/></div>
              <div class="cell"><input class="desc" value="Ray-Ban Meta Sunglasses"/></div>
              <div class="cell"><input class="hs" value="9004.10.3"/></div>
              <div class="cell"><input class="unit" value="299.00" inputmode="decimal"/></div>
              <div class="cell"><span class="lineTotal">598.00</span></div>
              <div class="cell"><button class="del" onclick="deleteRow(this)">Del</button></div>
            </div>
            <div class="row gridCols" data-row data-sku="">
              <div class="cell"><span class="rowIndex">2</span></div>
              <div class="cell"><input class="qty" value="3" inputmode="numeric"/></div>
              <div class="cell"><input class="desc" value="Meta Quest Link Cable"/></div>
              <div class="cell"><input class="hs" value="9504.90"/></div>
              <div class="cell"><input class="unit" value="79.99" inputmode="decimal"/></div>
              <div class="cell"><span class="lineTotal">239.97</span></div>
              <div class="cell"><button class="del" onclick="deleteRow(this)">Del</button></div>
            </div>
          </div></div>

          <!-- Inline controls under table -->
          <div class="controls">
            <button class="btn" onclick="addBlankRow()">Add Row</button>
          </div>

          <!-- Totals (no VAT, only total) -->
          <div class="totals">
            <div class="totalCard">
              <div class="totalRow"><span>Total (<span id="currencyLabel2">USD</span>)</span><strong id="grandTotal">0.00</strong></div>
            </div>
          </div>

          <!-- Print-only table (populated before print) -->
          <table class="print-only" id="printTable"></table>
        </div>
      </section>
    </div>
  </main>
</div>

<script>
  // === Product catalogue with HS + unit + hidden SKUs (for future exports) ===
  const catalogue = {
    "Ray-Ban Meta Sunglasses": { hs: "9004.10.3", unit: 299.00, sku: "" },
    "Oakley Meta Sunglasses": { hs: "9004.10.3", unit: 499.00, sku: "" },
    "Even Reality E1 Smart Glasses": { hs: "9004.10.3", unit: 599.00, sku: "" },

    "Meta Quest 3 512GB VR Gaming Console": { hs: "9504.50.90", unit: 499.99, sku: "SK-1000189-01" },
    "Meta Quest 3S 128GB VR Gaming Console": { hs: "9504.50.90", unit: 299.99, sku: "SK-1000203-01" },
    "Meta Quest 3S 256GB VR Gaming Console": { hs: "9504.50.90", unit: 399.99, sku: "SK-1000209-01" },

    "Meta Quest 2 Controllers": { hs: "9504.90", unit: 69.99, sku: "" },
    "Meta Quest 3 Carrying Case": { hs: "9504.90", unit: 69.99, sku: "SK-1000045-01" },
    "Meta Quest 3/3S Compact Carrying Case": { hs: "9504.90", unit: 69.99, sku: "SK-1000044-01" },
    "Meta Quest 3 Elite Strap": { hs: "9504.90", unit: 129.99, sku: "899-00510-01" },
    "Meta Quest 3 Elite Strap with Battery": { hs: "9504.90", unit: 149.99, sku: "899-00560-02" },
    "Meta Quest 3 Silicone Facial Interface": { hs: "9504.90", unit: 49.99, sku: "" },
    "Meta Quest Link Cable": { hs: "9504.90", unit: 79.99, sku: "" },

    "HTC VIVE Pro 2 Full Kit": { hs: "9504.50.90", unit: 1100.00, sku: "" },
    "Insta360 Quick Release Mount": { hs: "9620.00.25", unit: 39.99, sku: "" },
    "Insta360 Mic Air (1 TX + 1 RX)": { hs: "8518.10.00", unit: 0.00, sku: "CINSABWA" },
    "Insta360 Xplorer Grip Kit for Insta360 Ace Pro 2/Insta360 Ace Pro": { hs: "9620.00.25", unit: 0.00, sku: "CINSABGW" },
    "Insta360 Bullet Time Cord": { hs: "9620.00.25", unit: 0.00, sku: "CINX2CB/C" },
    "Insta360 X5 Replacement Lens Kit": { hs: "8529.90.90", unit: 0.00, sku: "CINSBAHB" },

    "RANGE 2 3D Scanner": { hs: "9031.49.90", unit: 621.62, sku: "" }
  };

  // === Auto-date ===
  const dateEl = document.getElementById('invoiceDate');
  if (dateEl && dateEl.dataset.autodate === "true" && !dateEl.value) {
    const d = new Date();
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yyyy = d.getFullYear();
    dateEl.value = `${dd}-${mm}-${yyyy}`;
  }
  dateEl?.addEventListener('input', () => dateEl.dataset.autodate = 'false');

  // === Invoice number ===
  function generateInvoiceNumber() {
    const n = Math.floor(100000 + Math.random() * 900000); // 6-digit
    document.getElementById('invoiceNumber').value = n;
    saveState();
  }

  // === Row helpers ===
  function rowToData(row) {
    return {
      qty:  parseFloat(row.querySelector('.qty').value) || 0,
      desc: (row.querySelector('.desc').value || '').trim(),
      hs:   (row.querySelector('.hs').value || '').trim(),
      unit: parseFloat(row.querySelector('.unit').value) || 0,
      sku:  row.dataset.sku || ''
    };
  }

  function setLine(row, amount) {
    row.querySelector('.lineTotal').textContent = amount.toFixed(2);
  }

  function updateRowNumbers() {
    const rows = [...document.querySelectorAll('#items [data-row]')];
    rows.forEach((r, i) => {
      const idx = r.querySelector('.rowIndex');
      if (idx) idx.textContent = String(i + 1);
    });
  }

  function recalcTotals() {
    let sum = 0;
    document.querySelectorAll('#items [data-row]').forEach(row => {
      const d = rowToData(row);
      const line = d.qty * d.unit;
      setLine(row, line);
      sum += line;
    });
    updateRowNumbers();

    const currency = (document.getElementById('currency').value || 'USD').toUpperCase();
    document.getElementById('currencyLabel2').textContent = currency;

    document.getElementById('grandTotal').textContent = sum.toFixed(2);
  }

  function deleteRow(btn) {
    btn.closest('[data-row]')?.remove();
    recalcTotals();
    saveState();
  }

  function addBlankRow() {
    addRow({ qty: 1, desc: 'New Product', hs: '0000.00.00', unit: 0, sku: '' });
  }

  function addRow({ qty, desc, hs, unit, sku }) {
    const items = document.getElementById('items');
    const row = document.createElement('div');
    row.className = 'row gridCols';
    row.setAttribute('data-row', '');
    if (sku) row.dataset.sku = sku;

    row.innerHTML = `
      <div class="cell"><span class="rowIndex"></span></div>
      <div class="cell"><input class="qty" value="${qty}" inputmode="numeric"/></div>
      <div class="cell"><input class="desc" value="${desc}"/></div>
      <div class="cell"><input class="hs" value="${hs}"/></div>
      <div class="cell"><input class="unit" value="${Number(unit).toFixed(2)}" inputmode="decimal"/></div>
      <div class="cell"><span class="lineTotal">${(qty * unit).toFixed(2)}</span></div>
      <div class="cell"><button class="del" onclick="deleteRow(this)">Del</button></div>`;

    items.appendChild(row);
    recalcTotals();
    saveState();
  }

  function addProduct() {
    const sel = document.getElementById('productSelect');
    const key = sel.value;
    if (!key) return alert('Choose a product first.');
    const p = catalogue[key];
    const existing = [...document.querySelectorAll('#items [data-row]')]
      .find(r => {
        const d = rowToData(r);
        return d.desc === key && d.hs === p.hs && Number(d.unit).toFixed(2) === Number(p.unit).toFixed(2);
      });

    if (existing) {
      const qtyInput = existing.querySelector('.qty');
      qtyInput.value = (parseFloat(qtyInput.value || 0) + 1).toString();
      recalcTotals();
      saveState();
    } else {
      addRow({ qty: 1, desc: key, hs: p.hs, unit: p.unit, sku: p.sku || '' });
    }
    sel.selectedIndex = 0;
  }

  // === Print: plain table ===
  function fmt(n) { return (isNaN(n) ? 0 : n).toFixed(2); }
  function escapeHtml(s) { return (s + "").replace(/[&<>\"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

  function buildPrintTable() {
    const tbl = document.getElementById('printTable');
    tbl.innerHTML = '';
    const cur = (document.getElementById('currency').value || 'USD').toUpperCase();
    const thead = document.createElement('thead');
    thead.innerHTML = '<tr><th style="width:6%">#</th><th style="width:8%">Qty</th><th>Description</th><th style="width:16%">HS Code</th><th style="width:16%">Unit (' + escapeHtml(cur) + ')</th><th style="width:18%">Line Total</th></tr>';
    const tbody = document.createElement('tbody');

    const rows = [...document.querySelectorAll('#items [data-row]')];
    rows.forEach((row, idx) => {
      const d = rowToData(row);
      const line = (d.qty * d.unit) || 0;
      const tr = document.createElement('tr');
      tr.innerHTML = `<td style="text-align:right">${idx + 1}</td>
        <td style="text-align:right">${d.qty}</td>
        <td>${escapeHtml(d.desc)}</td>
        <td>${escapeHtml(d.hs)}</td>
        <td style="text-align:right">${fmt(d.unit)}</td>
        <td style="text-align:right">${fmt(line)}</td>`;
      tbody.appendChild(tr);
    });

    const grand = document.getElementById('grandTotal').textContent || '0.00';
    const trTotal = document.createElement('tr');
    trTotal.innerHTML = `<td></td><td></td><td></td><td></td><td style="text-align:right;font-weight:700">Total</td><td style="text-align:right;font-weight:700">${escapeHtml(grand)}</td>`;
    tbody.appendChild(trTotal);

    tbl.appendChild(thead);
    tbl.appendChild(tbody);
  }

  window.addEventListener('beforeprint', buildPrintTable);

  // === State persistence (auto-save) ===
  const STORAGE_KEY = 'invoice_pro_state_v2_no_vat';

  function getState() {
    const items = [...document.querySelectorAll('#items [data-row]')].map(row => rowToData(row));
    return {
      meta: {
        invoice: document.getElementById('invoiceNumber').value || '',
        date: document.getElementById('invoiceDate').value || '',
        waybill: document.getElementById('waybill').value || '',
        currency: (document.getElementById('currency').value || 'USD').toUpperCase()
      },
      items,
      totals: {
        total: document.getElementById('grandTotal').textContent || '0.00'
      },
      parties: {
        shipper: document.getElementById('shipper').value || '',
        soldto: document.getElementById('soldto').value || ''
      }
    };
  }

  function setState(st) {
    if (!st || !st.meta) return;
    document.getElementById('invoiceNumber').value = st.meta.invoice || '';
    document.getElementById('invoiceDate').value = st.meta.date || '';
    document.getElementById('waybill').value = st.meta.waybill || '';
    document.getElementById('currency').value = st.meta.currency || 'USD';

    if (st.parties) {
      document.getElementById('shipper').value = st.parties.shipper || '';
      document.getElementById('soldto').value = st.parties.soldto || '';
    }

    const itemsContainer = document.getElementById('items');
    [...itemsContainer.querySelectorAll('[data-row]')].forEach(r => r.remove());
    (st.items || []).forEach(i => addRow({ qty: i.qty, desc: i.desc, hs: i.hs, unit: i.unit, sku: i.sku || '' }));
    recalcTotals();
  }

  function saveState() {
    try {
      const st = getState();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
    } catch (e) {
      console.warn('Could not save invoice state:', e);
    }
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const st = JSON.parse(raw);
      if (!st || !st.meta) return false;
      setState(st);
      return true;
    } catch (e) {
      console.warn('Could not load invoice state:', e);
      return false;
    }
  }

  // === Export helpers ===
  function exportCSV() {
    const st = getState();
    const header = ['SKU', 'Description', 'HS Code', 'Qty', 'Unit', 'Line Total'];
    const rows = st.items.map(i => [i.sku || '', i.desc, i.hs, i.qty, fmt(i.unit), fmt(i.qty * i.unit)]);
    rows.push([]);
    rows.push(['', '', '', 'Total', '', st.totals.total]);
    const csv = [header.join(','), ...rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))].join('\n');
    downloadFile('invoice.csv', 'text/csv', csv);
  }

  function exportJSON() {
    downloadFile('invoice.json', 'application/json', JSON.stringify(getState(), null, 2));
  }

  function downloadFile(name, type, data) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([data], { type }));
    a.download = name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1500);
  }

  // Live recalc + auto-save on edits
  document.getElementById('items').addEventListener('input', e => {
    if (e.target.matches('.qty,.unit,.desc,.hs')) {
      recalcTotals();
      saveState();
    }
  });
  ['invoiceNumber', 'invoiceDate', 'waybill', 'currency', 'shipper', 'soldto'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', saveState);
  });

  // Initial init with auto-restore
  (function init() {
    const restored = loadState();
    if (!restored) {
      recalcTotals();
    }
  })();
</script>
</body>
</html>
